# Adicionar ao [global] do /etc/samba/smb.conf no DC1-Zentyal
# Permite transferência de zona para NS2 e configura forwarder

# DNS forwarder aponta para Technitium
dns forwarder = 10.41.10.2

# Permite AXFR/IXFR para NS2
allow transfer = 10.41.10.11

# Segurança extra — NTLMv2 obrigatório
ntlm auth = ntlmv2-only

# Log mínimo (ajuste conforme necessidade)
log level = 1
